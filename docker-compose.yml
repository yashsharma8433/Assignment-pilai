# ─────────────────────────────────────────────────────────────
#  Student Management System — Docker Compose (OrbStack)
#  All images use Alpine variants for minimal storage footprint
# ─────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: sms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-student_mgmt}
      POSTGRES_USER: ${DB_USER:-sms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sms_user} -d ${DB_NAME:-student_mgmt}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sms_net

volumes:
  pgdata:
    driver: local

networks:
  sms_net:
    driver: bridge
